<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entre</title>
    <link rel="stylesheet" href="./Css/site.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="Background">
    <header>
    <h1>Diamatti</h1>
    <nav>
        <ul class="Menu">
             <li><a href="./index.html">Home</a></li>
             <li><a href="./sobre.html">Sobre</a></li>
             <li><a href="./produtos.html">Produtos</a></li>
             <li><a href="./contatos.html">Contatos</a></li>
        </ul>
    </nav>
    <a class="Entre" style="border-bottom: 2px solid silver;" href="./entre.html">Entrar </a>
    </header>
    <main class="EntreMain">
        <section>
            <img src="./Imagens/Logo Diamatti.png" alt="Logo">
            <form action="./index.html" method="post" target="_blank">
                <div class="DivNome">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome">
                </div>
                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" name="cpf" minlength="11" maxlength="14">
                </div>
                <div>
                    <label for="date">Data de nascimento</label>
                    <input type="date" name="date" >
                </div>
                <div>
                    <label for="email">E-Mail *</label>
                    <input type="email" name="email" required>
                </div>
                <div>
                    <label for="senha">Senha *</label>
                    <input type="password" name="senha" required minlength="8">
                </div>
                <div class="BotoesForm">
                    <input type="submit" value="Cadastrar">
                </div>
            </form>
        </section>
    </main>
    <footer class="FooterEntre">
        <p>Redes sociais: <a href="https://www.instagram.com/kaua_afra/" target="_blank"><i class="fa fa-instagram"></i> Instagram</a></p>
        <p>Desenvolvido por Diamatti©</p>
    </footer>
</body>
</html>
