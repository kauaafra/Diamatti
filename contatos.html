<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contatos</title>
    <link rel="stylesheet" href="./Css/site.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body class="BackgroundContact">
    <header>
    <h1>Diamatti</h1> 
    <nav>
        <ul class="Menu">
             <li><a href="./index.html">Home</a></li>
             <li><a href="./sobre.html">Sobre</a></li>
             <li><a href="./produtos.html">Produtos</a></li>
             <li><a style="border-bottom: 2px solid silver;" href="./contatos.html">Contatos</a></li>
        </ul>
    </nav>
    <a class="Entre" href="./entre.html">Entrar </a>
    </header>
        <section class="ContatosMain">
            <img src="./Imagens/Logo Diamatti.png" alt="Logo">
            <form action="./index.html">
                <div class="NomeCont">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" required>
                </div>
                <div class="EmailCont">
                    <label for="email">E-Mail</label>
                    <input type="email" name="email" required>
                </div>
                <div class="SelecioneCon" >
                    <label for="opcao">Escolha uma opção</label>
                    <select  name="select" style="width: 336px;">
                        <option value=""> </option>
                        <option value="duvidas">Dúvidas</option>
                        <option value="faleconosco">Fale Conosco</option>
                        <option value="relatarproblema">Relatar Problema</option>
                    </select>
                </div>
                <div class="DescrevaCont">
                    <label for="descreva">Descreva</label>
                    <textarea name="descreva" required></textarea>
                </div>
                <div class="EnviarButton">
                <input type="submit" name="Enviar">
                </div>
            </form>
        </section>

    <footer class="FooterEntre">
        <p>Redes sociais: <a href="https://www.instagram.com/kaua_afra/" target="_blank"><i class="fa fa-instagram"></i> Instagram</a></p>
        <p>Desenvolvido por Diamatti©</p>
    </footer>
</body>
</html>
